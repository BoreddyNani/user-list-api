name: CI — Run Tests

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: Nani143
          POSTGRES_DB: job_tracker_db
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci   # faster + reproducible vs npm install

      - name: Run Prisma migrations on test DB
        env:
          DATABASE_URL: postgresql://postgres:Nani143@localhost:5432/job_tracker_db?schema=public
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:Nani143@localhost:5432/job_tracker_db?schema=public
          JWT_SECRET: tarunnaniboreddyammuharikapallavimanjusaraswathi
        run: npm test --forceExit

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/